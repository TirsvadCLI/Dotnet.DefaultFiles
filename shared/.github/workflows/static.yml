# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  BuildSecrets:
    runs-on: ubuntu-latest
    environment: database
    steps:
      - uses: actions/checkout@v6
      - name: Create .env file
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "ConnectionStrings__AppDbContext=Host=${{ secrets.DB_HOST }};Port=${{ secrets.DB_PORT }};Database=${{ secrets.DB_NAME }};Username=${{ secrets.DB_USER }};Password=${{ secrets.DB_PASSWORD }}" >> .env
          echo "TokenValidationParameters__IssuerSigningKey=${{ secrets.TOKENVALIDATIONPARAMETERS__ISSUERSIGNINGKEY }}" >> .env
      - name: Upload .env file as artifact
        uses: actions/upload-artifact@v7
        with:
          name: env-file
          path: .env
          if-no-files-found: warn
          compression-level: 6
          overwrite: false
          include-hidden-files: true

  build-doxygen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Install Doxygen
        run: sudo apt-get install -y doxygen graphviz
      - name: Generate Docs
        run: doxygen Doxyfile
      - name: Upload Doxygen HTML as artifact
        uses: actions/upload-artifact@v7
        with:
          name: doxygen-html
          path: ./docs/doxygen/html

  build-coverage:
    name: Build, Test and Collect Coverage
    needs: BuildSecrets
    runs-on: ubuntu-latest
    environment: database
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Download .env file artifact
        uses: actions/download-artifact@v8
        with:
          name: env-file
      - name: Copy .env file to API project
        run: cp .env src/Api/.env
      - name: Load .env file
        run: export $(cat .env | xargs)
      - name: Find solution file
        id: find_sln
        run: |
          SLN_FILE=$(find . -maxdepth 1 -name "*.slnx" | head -n 1)
          if [ -z "$SLN_FILE" ]; then
            echo "No .slnx file found!" >&2
            exit 1
          fi
          echo "solution_file=$SLN_FILE" >> $GITHUB_OUTPUT
      - name: Restore dependencies
        run: dotnet restore ${{ steps.find_sln.outputs.solution_file }}
      - name: Build
        run: dotnet build --no-restore ${{ steps.find_sln.outputs.solution_file }}
      - name: Test with coverage
        run: dotnet test ${{ steps.find_sln.outputs.solution_file }} --no-build --collect:"XPlat Code Coverage"
      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool
      - name: Add .NET global tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Generate HTML coverage report
        run: reportgenerator -reports:**/TestResults/**/coverage.cobertura.xml -targetdir:coverage-html -reporttypes:Html
      - name: Upload coverage HTML as artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: coverage-html

  deploy-github-pages:
    runs-on: ubuntu-latest
    needs: 
      - build-doxygen
      - build-coverage
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Download Doxygen HTML artifact
        uses: actions/download-artifact@v8
        with:
          name: doxygen-html
          path: ./doxygen-tmp
      - name: Download coverage HTML artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-html
          path: ./coverage-tmp
      - name: Prepare GitHub Pages output
        run: |
          mkdir -p ./github-pages/doxygen-html
          cp tools/github-pages/index.html ./github-pages/index.html
          mv ./doxygen-tmp/* ./github-pages/doxygen-html/
          mv ./coverage-tmp/* ./github-pages/coverage-html/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './github-pages'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Print GitHub Pages URL
        run: |
          echo "GitHub Pages deployed at: https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/"
