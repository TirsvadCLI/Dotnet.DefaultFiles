# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-doxygen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Doxygen
        run: sudo apt-get install -y doxygen graphviz
      - name: Generate Docs
        run: doxygen Doxyfile
      - name: Upload Doxygen HTML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: ./docs/doxygen/html

  check-google-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check for Google owners file
        run: |
          if ! ls ./shared/github-pages/google*.html 1> /dev/null 2>&1; then
            echo "No Google verification file found!"
            exit 1
          fi

  copy-google-file:
    needs: check-google-file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create path for Doxygen HTML
        run: mkdir -p ./docs/doxygen/html
      - name: Copy Google owners file
        run: cp ./shared/github-pages/google*.html ./docs/doxygen/html/
      - name: Upload Doxygen HTML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html-with-google-file
          path: ./docs/doxygen/html

  deploy-github-pages:
    runs-on: ubuntu-latest
    needs: 
      - copy-google-file
      - build-doxygen
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Download Doxygen HTML artifact
        uses: actions/download-artifact@v4
        with:
          name: doxygen-html
          path: ./docs/doxygen/html
      - name: Download Doxygen HTML artifact
        uses: actions/download-artifact@v4
        with:
          name: doxygen-html-with-google-file
          path: ./docs/doxygen/html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/doxygen/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Print GitHub Pages URL
        run: |
          echo "GitHub Pages deployed at: https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/"
