# ci-di configurations
# This contains the configuration for the ci-di tool, which is used to automate the development process.
# It includes settings for Docker, as well as the directory structure for a Clean Architecture solution.
# Docker.Container.Database: This is the full name of the Docker container that will be used for the database.
#                            It should include the image name and tag, as well as any necessary environment variables or ports.
Docker:
  Container:  
    Database: 
    Build: build-stage
    Tests: tests-stage

# Clean Architecture Solution Configuration
Directories:
  - .github
  - .github/instructions
  - .github/prompts
  - .github/agents
  - docs/quality-criteria
  - docs/quality-criteria/ooa
  - docs/quality-criteria/ood
  - docs/quality-criteria/oop
  - src
  - tests
  - docs
  - docs/doxygen
  - docs/adr
  - docs/use-cases
ToCopyByForce:
  - .github/copilot-instructions.md
  - .github/instructions
  - .github/prompts
  - .github/agents
  - docs/quality-criteria
ToCopy:
  - .gitignore
  - Directory.Build.targets
  - Directory.Build.props
  - Directory.Packages.props
  - LICENSE
  - .editorconfig
CleanArchitectureDomainDirectories:
  - src/Domain/Entities
  - src/Domain/Interfaces
  - src/Domain/ValueObjects
CleanArchitectureApplicationDirectories:
  - src/Application/Interfaces
  - src/Application/Services
  - src/Application/Managers
  - src/Application/Helpers
  - src/Application/DTOs
  - src/Application/Mappers
CleanArchitectureInfrastructureDirectories:
  - src/Infrastructure/Managers
CleanArchitectureInfrastructureDataDirectories:
  - src/Infrastructure.Data/Persistents
  - src/Infrastructure.Data/Persistents/Configurations
  - src/Infrastructure.Data/Repositories
